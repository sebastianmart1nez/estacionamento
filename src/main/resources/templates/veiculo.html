<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Veículos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img th:src="@{/img/parking_cor.png}" alt="Parking Lot Logo">
    </div>

    <h1>Registo de Veículos</h1>

    <p class="mensagem" th:text="${mensagem}"></p>

    <hr>

    <div id="tabelaVeiculos">
        <table>
            <tr>
                <th>Matrícula</th>
                <th>Data</th>
                <th>Hora</th>
            </tr>

            <tr th:each="f : ${lista}">
                <td class="coluna-matricula" th:text="${f.matricula}"></td>
                <td th:text="${#strings.substring(f.horaEntrada, 0, 10)}"></td>
                <td th:text="${#strings.substring(f.horaEntrada, 11, 16)}"></td>
            </tr>
        </table>
    </div>

    <div class="acoes">
        <button onclick="toggleTabela()">Mostrar/Esconder</button>
        <button onclick="marcarMatricula()">Destacar Matrículas</button>
    </div>

    <h2>Novo veículo</h2>

    <form action="/veiculos" method="post">
        <input type="text" name="matricula" placeholder="Matrícula" required>
        <input type="datetime-local" name="horaEntrada" required>
        <button type="submit">Adicionar</button>
    </form>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
