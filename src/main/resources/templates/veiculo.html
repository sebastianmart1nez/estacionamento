<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Veículos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Registo de Veículos</h1>
<hr>
<h3 th:text="${mensagem}"></h3>

<div id="tabelaVeiculos">
    <table>
        <tr>
            <th>Matrícula</th>
            <th>Data</th>
            <th>Hora</th>
        </tr>

        <tr th:each="f : ${lista}">
            <td class="coluna-matricula" th:text="${f.matricula}"></td>

            <!-- separa data e hora do datetime-local -->
            <td th:text="${#strings.substring(f.horaEntrada, 0, 10)}"></td>
            <td th:text="${#strings.substring(f.horaEntrada, 11, 16)}"></td>
        </tr>
    </table>
</div>
<button class="botao" onclick="toggleTabela()">Mostrar/Esconder tabela</button>
<button class="botao" onclick="marcarMatricula()">Marcar matrículas</button>

<h2>Novo veículo</h2>

<form action="/veiculos" method="post">

    <input type="text" name="matricula" placeholder="Matrícula" required>

    <input type="datetime-local" name="horaEntrada" required>

    <button type="submit">Adicionar</button>

</form>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
