<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão de Estacionamento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="title-block">
            <div class="logo">P</div>
            <div>
                <h1>Sistema de Gestão de Estacionamento</h1>
                <p class="subtitle">Tarifa: 1.50€/hora | Mínimo: 30 minutos</p>
            </div>
        </div>
    </header>

    <!-- DASHBOARD CARDS -->
    <section class="grid">

        <div class="card">
            <div>
                <p class="label">Vagas Disponíveis</p>
                <h2 class="value green" th:text="${vagasDisponiveis}">50</h2>
                <span class="small">de 50 totais</span>
            </div>
            <div class="icon green-bg">P</div>
        </div>

        <div class="card">
            <div>
                <p class="label">Vagas Ocupadas</p>
                <h2 class="value orange" th:text="${vagasOcupadas}">0</h2>
                <span class="small">0% ocupação</span>
            </div>
            <div class="icon orange-bg">🚗</div>
        </div>

        <div class="card">
            <div>
                <p class="label">Veículos Hoje</p>
                <h2 class="value blue" th:text="${veiculosHoje}">0</h2>
                <span class="small">Total processados</span>
            </div>
            <div class="icon blue-bg">🕒</div>
        </div>

        <div class="card">
            <div>
                <p class="label">Receita Total</p>
                <h2 class="value purple" th:text="${receitaHoje}">0.00€</h2>
                <span class="small">Acumulado hoje</span>
            </div>
            <div class="icon purple-bg">€</div>
        </div>

    </section>

    <!-- FORM -->
    <section class="card form-card">

        <h3>Registar Entrada</h3>

        <form action="/veiculos" method="post" class="form">
            <input type="text" name="matricula" placeholder="Matrícula (ex: 00-AA-00)" required>
            <input type="datetime-local" name="horaEntrada" required>
            <button type="submit">Adicionar</button>
        </form>

    </section>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
